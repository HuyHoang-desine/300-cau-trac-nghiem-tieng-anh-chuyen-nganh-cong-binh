<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Luyện tập Tiếng Anh</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='home.css') }}">
</head>
<body class="new-home">

<div class="bg-overlay"></div>

<img src="/static/logo.png" class="logo-left">
<img src="/static/logo.png" class="logo-right">

<div class="title-board">
    <img src="/static/title_board.png">
    <div class="title-text">
        LUYỆN TẬP TIẾNG ANH<br>
        CHUYÊN NGÀNH
    </div>
</div>

<form action="/start_exam" method="POST">

    <div class="home-layout">

        <!-- LEFT -->
        <div class="left-panel">

            <div class="unit-banner">
                <img src="/static/unit_box.png">
                <div class="unit-label">Đơn vị:</div>
            </div>

            <div class="unit-row">
                <input type="number" name="unit_b" min="0" max="10" required>
                <span>/</span>
                <input type="number" name="unit_c" min="0" max="10" required>
                <span>/</span>
                <input type="number" name="unit_d" min="0" max="10" required>
            </div>

            <div class="left-photo">
                <img src="/static/left.jpg">
            </div>

        </div>

        <!-- CENTER -->
        <div class="center-panel">

            <button type="submit" class="main-btn">
                Bắt đầu
            </button>

            <a href="/practice" class="main-btn">
                Luyện tập
            </a>

            <a href="/leaderboard" class="main-btn">
                Điểm số
            </a>

        </div>

        <!-- RIGHT -->
        <div class="right-panel">

            <div class="name-box">
                <img src="/static/name_box.png">

                <div class="name-content">
                    <label>Họ và tên:</label>
                    <input type="text" name="name" required>
                </div>
            </div>

            <div class="right-photo">
                <img src="/static/right.jpg">
            </div>

        </div>

    </div>

</form>

<div class="question-count">
    Số câu hỏi: {{ questions|length }}
</div>

</body>
</html>
