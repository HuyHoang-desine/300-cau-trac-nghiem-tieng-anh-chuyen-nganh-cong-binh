<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luyện tập Tiếng Anh</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='home.css') }}">
</head>
<body class="new-home">

<div class="bg-overlay"></div>

<header class="home-header">
    <img src="/static/logo.png" class="logo-left" alt="">
    <div class="title-board">
        <img src="/static/title_board.png" alt="">
    </div>
    <img src="/static/logo.png" class="logo-right" alt="">
</header>

<form action="/start_exam" method="POST" class="home-main">

<section class="left-panel">

<div class="unit-banner">
<img src="/static/unit_box.png" alt="">

<div class="unit-inputs">
<input type="number" name="unit_b" min="0" max="10" required>
<span>/</span>
<input type="number" name="unit_c" min="0" max="10" required>
<span>/</span>
<input type="number" name="unit_d" min="0" max="10" required>
</div>

</div>

<div class="left-photo">
<img src="/static/left.jpg" alt="">
</div>

</section>

<section class="center-panel">

<button type="submit" class="main-btn">BẮT ĐẦU</button>

<a href="/practice" class="main-btn">LUYỆN TẬP</a>

<a href="/leaderboard" class="main-btn">ĐIỂM SỐ</a>

</section>

<section class="right-panel">

<div class="name-box">

<img src="/static/name_box.png" alt="">

<input
type="text"
name="name"
class="name-input"
placeholder="Nhập họ và tên..."
autocomplete="off"
required>

</div>

<div class="right-photo">
<img src="/static/right.jpg" alt="">
</div>

</section>

</form>

<footer class="question-count">
Số câu hỏi: {{ questions|length }}
</footer>

</body>
</html>
