<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Trắc nghiệm Tiếng Anh</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="home-page">

<div class="home-overlay">

    <img src="/static/logo.png" class="logo-left">
    <img src="/static/logo.png" class="logo-right">

    <div class="title-board">
        LUYỆN TẬP TIẾNG ANH<br>
        CHUYÊN NGÀNH
    </div>

    <form action="/start_exam" method="POST">

        <div class="unit-panel">
            <div class="unit-label">Đơn vị</div>

            <div class="unit-row">
                <input type="number" min="0" max="10" name="unit_b" required>
                <span>/</span>
                <input type="number" min="0" max="10" name="unit_c" required>
                <span>/</span>
                <input type="number" min="0" max="10" name="unit_d" required>
            </div>
        </div>

        <div class="name-panel">
            <label>Họ và tên :</label>
            <input type="text" name="name" required>
        </div>

        <div class="menu-group">
            <button type="submit" class="home-btn">Bắt đầu</button>
            <a href="/practice" class="home-btn">Luyện tập</a>
            <a href="/leaderboard" class="home-btn">Điểm số</a>
        </div>

    </form>

    <div class="question-counter">
        Số câu hỏi: {{ questions|length }}
    </div>

</div>

</body>
</html>
