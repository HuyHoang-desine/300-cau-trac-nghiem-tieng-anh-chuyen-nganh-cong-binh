<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Luyện tập Tiếng Anh</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='home.css') }}">
</head>
<body class="new-home">

<div class="bg-overlay"></div>

<header class="home-header">
    <img src="{{ url_for('static', filename='logo.png') }}" 
         class="logo-left">

    <div class="title-board">

        <img src="{{ url_for('static', filename='title_board.png') }}"  
             alt="Title">

    </div>
    <img src="{{ url_for('static', filename='logo.png') }}"
         class="logo-right">
</header>

<form action="/start_exam" method="POST" class="home-main">

<section class="left-panel">

<div class="unit-banner">
<img src="{{ url_for('static', filename='unit_box.png') }}">

<div class="unit-inputs">
<input type="number" name="unit_b" min="0" max="10" required>
<span>/</span>
<input type="number" name="unit_c" min="0" max="10" required>
<span>/</span>
<input type="number" name="unit_d" min="0" max="10" required>
</div>

</div>

<div class="left-photo">
<img src="{{ url_for('static', filename='left.jpg') }}">
</div>

</section>

<section class="center-panel">

<button type="submit" class="main-btn">BẮT ĐẦU</button>

<a href="/practice" class="main-btn">LUYỆN TẬP</a>

<a href="/leaderboard" class="main-btn">ĐIỂM SỐ</a>

</section>

<section class="right-panel">

<div class="name-box">

    <img src="{{ url_for('static', filename='name_box.png') }}">

    <div class="name-content">

        <input
            type="text"
            name="name"
            class="name-input"
            placeholder="Nhập họ và tên..."
            autocomplete="off"
            required>

    </div>

</div>

<div class="right-photo">
<img src="{{ url_for('static', filename='right.jpg') }}">
</div>

</section>

</form>

<footer class="question-count">
Số câu hỏi: {{ questions|length }}
</footer>

</body>
</html>
