<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Luyện tập Tiếng Anh</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="new-home">

<div class="bg-overlay"></div>

<img src="/static/logo.png" class="logo-left">
<img src="/static/logo.png" class="logo-right">

<div class="title-board">
    <div class="ring ring1"></div>
    <div class="ring ring2"></div>
    <div class="ring ring3"></div>
    <div class="ring ring4"></div>

    <h1>
        LUYỆN TẬP TIẾNG ANH<br>
        CHUYÊN NGÀNH
    </h1>
</div>

<div class="unit-banner">
    Đơn vị:
</div>

<form action="/start_exam" method="POST">

    <div class="unit-input-row">
        <input type="number" name="unit_b" min="0" max="10" required>
        <span>/</span>
        <input type="number" name="unit_c" min="0" max="10" required>
        <span>/</span>
        <input type="number" name="unit_d" min="0" max="10" required>
    </div>

    <div class="name-box">
        <label>Họ và tên :</label>
        <input type="text" name="name" required>
    </div>

    <button type="submit" class="main-btn btn-start">
        Bắt đầu
    </button>
</form>

<a href="/practice" class="main-btn btn-practice">
    Luyện tập
</a>

<a href="/leaderboard" class="main-btn btn-score">
    Điểm số
</a>

<div class="photo-left">
    <img src="/static/left.jpg">
</div>

<div class="photo-right">
    <img src="/static/right.jpg">
</div>

<div class="question-count">
    Số câu hỏi: {{ questions|length }}
</div>

</body>
</html>
