<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Sửa câu hỏi</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="admin-page">

<div class="form-card">

    <h1 class="form-title">
        Sửa câu hỏi
    </h1>

    <form method="POST">

        <div class="form-group">
            <label>Câu hỏi</label>
            <textarea
                name="question"
                class="form-control"
                rows="4"
                required>{{ question.question }}</textarea>
        </div>

        <div class="form-group">
            <label>Đáp án A</label>
            <input name="option_a"
                   class="form-control"
                   value="{{ question.option_a }}"
                   required>
        </div>

        <div class="form-group">
            <label>Đáp án B</label>
            <input name="option_b"
                   class="form-control"
                   value="{{ question.option_b }}"
                   required>
        </div>

        <div class="form-group">
            <label>Đáp án C</label>
            <input name="option_c"
                   class="form-control"
                   value="{{ question.option_c }}"
                   required>
        </div>

        <div class="form-group">
            <label>Đáp án D</label>
            <input name="option_d"
                   class="form-control"
                   value="{{ question.option_d }}"
                   required>
        </div>

        <div class="form-group">
            <label>Đáp án đúng</label>
            <input name="correct_answer"
                   class="form-control"
                   value="{{ question.correct_answer }}"
                   required>
        </div>

        <div class="form-buttons">
            <button class="admin-btn save-btn">
                Cập nhật
            </button>

            <a href="/admin">
                <button type="button"
                        class="admin-btn cancel-btn">
                    Hủy
                </button>
            </a>
        </div>

    </form>

</div>
</body>
</html>
