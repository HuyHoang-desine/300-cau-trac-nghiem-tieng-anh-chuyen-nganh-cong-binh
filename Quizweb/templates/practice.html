<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Luyện tập</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="quiz-page">

<div class="quiz-header">
    <div class="top-btn">CHẾ ĐỘ LUYỆN TẬP</div>

    <a href="/" class="top-btn" style="text-decoration:none;">
        Trang chủ
    </a>
</div>

<div class="quiz-container">

    <div class="sidebar">
        <div class="timer-box">
            <h2>Số câu</h2>
            <div id="timer">{{ questions|length }}</div>
        </div>
    </div>

    <div class="question-area" style="overflow-y:auto;">

        {% for q in questions %}
        <div class="question-block active" style="display:block; margin-bottom:40px;">

            <div class="question-title">
                Câu {{ loop.index }}
            </div>

            <h3>{{ q.question }}</h3>

            <div class="practice-options">

                <div class="practice-answer"
                     onclick="checkAnswer(this, 'A', '{{ q.correct }}')">
                    A. {{ q.option_a }}
                </div>

                <div class="practice-answer"
                     onclick="checkAnswer(this, 'B', '{{ q.correct }}')">
                    B. {{ q.option_b }}
                </div>

                <div class="practice-answer"
                     onclick="checkAnswer(this, 'C', '{{ q.correct }}')">
                    C. {{ q.option_c }}
                </div>

                <div class="practice-answer"
                     onclick="checkAnswer(this, 'D', '{{ q.correct }}')">
                    D. {{ q.option_d }}
                </div>

            </div>

        </div>
        {% endfor %}

    </div>
</div>

<script>
function checkAnswer(element, selected, correct){

    let correctAnswers = correct.split(",");

    if(correctAnswers.includes(selected)){
        element.classList.add("correct");
    } else {
        element.classList.add("wrong");
    }

    let options = element.parentElement.children;
    let selectedCorrect = 0;

    for(let option of options){
        if(option.classList.contains("correct")){
            selectedCorrect++;
        }
    }

    if(selectedCorrect === correctAnswers.length){

        for(let option of options){
            option.style.pointerEvents = "none";

            let text = option.innerText.trim();

            for(let answer of correctAnswers){
                if(text.startsWith(answer + ".")){
                    option.classList.add("correct");
                }
            }
        }
    }
}
</script>

</body>
</html>
