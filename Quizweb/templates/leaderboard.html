<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Bảng điểm</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<a href="/" class="back-btn">
    ← Trang chủ
</a>
    
<div class="leaderboard-box">

<h1>BẢNG ĐIỂM</h1>

<table>
<tr>
    <th>Hạng</th>
    <th>Họ tên</th>
    <th>Đơn vị</th>
    <th>Điểm</th>
</tr>

{% for r in results %}
<tr>
    <td>{{ loop.index }}</td>
    <td>{{ r.name }}</td>
    <td>{{ r.unit }}</td>
    <td>{{ r.score }}/{{ r.total }}</td>
</tr>
{% endfor %}
</table>

</div>

</body>
</html>
